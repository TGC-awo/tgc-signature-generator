<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trinity Grace Church Signature Generator</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Montserrat', Arial, sans-serif;
  background: #f4f6f7;
  padding: 50px;
  color: #262626;
}

.container {
  max-width: 720px;
  margin: auto;
  background: white;
  padding: 40px;
  border-radius: 14px;
  box-shadow: 0 10px 35px rgba(0,0,0,0.08);
}

h1 {
  color: #213340;
  margin-bottom: 30px;
  font-weight: 600;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 18px;
  border: 1px solid #b2c5c3;
  border-radius: 6px;
  font-size: 14px;
  font-family: 'Montserrat', Arial, sans-serif;
}

button {
  background: #dd6c40;
  color: white;
  border: none;
  padding: 14px 24px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  margin-right: 10px;
  font-family: 'Montserrat', Arial, sans-serif;
  font-weight: 600;
}

button:hover {
  opacity: .9;
}

.preview {
  margin-top: 40px;
  padding: 25px;
  border: 1px solid #eee;
  background: #fff;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
<h1>Trinity Grace Church<br>Email Signature Generator</h1>

<input id="name" placeholder="Full Name">
<input id="title" placeholder="Job Title">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email Address">

<button onclick="generateSignature()">Generate Signature</button>
<button onclick="copySignature()">Copy Signature</button>

<div class="preview" id="preview"></div>
</div>

<script>

// Live phone formatting
document.getElementById("phone").addEventListener("input", function(e) {
  let x = e.target.value.replace(/\D/g, '').substring(0,10);
  let formatted = x;
  
  if (x.length > 3 && x.length <= 6) {
    formatted = "(" + x.substring(0,3) + ") " + x.substring(3);
  } else if (x.length > 6) {
    formatted = "(" + x.substring(0,3) + ") " +
                x.substring(3,6) + "-" +
                x.substring(6,10);
  }
  
  e.target.value = formatted;
});

function generateSignature() {

  const name = document.getElementById("name").value;
  const title = document.getElementById("title").value;
  const phone = document.getElementById("phone").value;
  const email = document.getElementById("email").value;

  const signature = `
<table cellpadding="0" cellspacing="0" style="font-family: 'Montserrat', Arial, sans-serif; font-size:14px; color:#262626;">
<tr>
<td style="padding-right:20px;">
<img src="TGC-Logo-Round3.jpg" width="95" style="display:block;">
</td>

<td style="border-left:3px solid #dd6c40; padding-left:20px;">
<strong style="font-size:16px; color:#213340; font-weight:600;">${name}</strong><br>
<span style="color:#b2c5c3;">${title}</span><br><br>

<span>${phone}</span><br>
<a href="mailto:${email}" style="color:#213340; text-decoration:none;">${email}</a><br>
<a href="https://trinitygraceathens.com/" style="color:#213340; text-decoration:none;">trinitygraceathens.com</a><br><br>

</td>
</tr>
</table>
`;

  document.getElementById("preview").innerHTML = signature;
}

function copySignature() {
  const preview = document.getElementById("preview");

  const temp = document.createElement("div");
  temp.innerHTML = preview.innerHTML;
  document.body.appendChild(temp);

  const range = document.createRange();
  range.selectNode(temp);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
  document.execCommand("copy");
  window.getSelection().removeAllRanges();

  document.body.removeChild(temp);

  alert("Signature copied! Paste it into Gmail → Settings → Signature");
}
</script>

</body>
</html>
